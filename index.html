<!DOCTYPE html>
<html lang="en">
<head>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Expense Tracker">
<meta name="mobile-web-app-capable" content="yes">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Family Expense Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: #f4f7fa; min-height: 100vh; color: #0f172a; display: flex; justify-content: center; }
  .app-container { width: 100%; max-width: 540px; background: #fff; min-height: 100vh; padding: 1.5rem 1.25rem; display: flex; flex-direction: column; }
  @media (min-width: 540px) { body { padding: 2rem 1rem; } .app-container { min-height: auto; border-radius: 24px; box-shadow: 0 10px 40px rgba(15, 23, 42, 0.06); padding: 2rem; } }
  h1 { font-size: 24px; font-weight: 700; text-align: center; color: #0f172a; letter-spacing: -0.02em; }
  .subtitle { font-size: 14px; color: #64748b; text-align: center; margin-top: 4px; font-weight: 500; }
  .user-badge { text-align: center; font-size: 12px; color: #0369a1; background: #e0f2fe; padding: 4px 12px; border-radius: 20px; width: fit-content; margin: 8px auto 0 auto; font-weight: 600; cursor: pointer; }
  .total-box { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); border-radius: 18px; padding: 1.5rem 1.25rem; text-align: center; margin: 1.5rem 0; box-shadow: 0 8px 20px rgba(15, 23, 42, 0.15); }
  .total-box .lbl { font-size: 11px; letter-spacing: .12em; color: #94a3b8; text-transform: uppercase; font-weight: 600; }
  .total-box .amt { font-size: 36px; font-weight: 700; color: #fff; margin-top: 4px; letter-spacing: -0.03em; }
  .total-box .amt2 { font-size: 15px; color: #cbd5e1; margin-top: 4px; font-weight: 500; }
  .sec { font-size: 11px; font-weight: 700; letter-spacing: .08em; color: #64748b; text-transform: uppercase; margin-bottom: 8px; margin-top: 1.25rem; display: flex; align-items: center; justify-content: space-between; }
  .trip-panel { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 1.1rem; margin-bottom: 1.25rem; }
  .trip-active { display: flex; align-items: center; gap: 8px; font-size: 15px; color: #0f172a; font-weight: 600; flex-wrap: wrap; }
  .cur-badge { font-size: 11px; background: #e0f2fe; color: #0369a1; border-radius: 8px; padding: 4px 8px; font-weight: 700; margin-left: auto; }
  .people-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #e2e8f0; }
  .person-pill { font-size: 12px; background: #fff; color: #475569; border-radius: 8px; padding: 4px 10px; font-weight: 500; border: 1px solid #e2e8f0; }
  .trip-actions-row { display: flex; gap: 8px; width: 100%; margin-top: 12px; }
  .trip-actions-row button { flex: 1; }
  .trip-list { margin-top: .75rem; display: none; }
  .trip-list.open { display: block; }
  .trip-item { display: flex; align-items: center; justify-content: space-between; padding: .75rem; border-radius: 10px; cursor: pointer; font-size: 14px; border: 1px solid #e2e8f0; margin-bottom: 6px; background: #fff; }
  .trip-item.active { border-color: #0f172a; background: #f8fafc; font-weight: 600; }
  .new-trip-form { display: none; margin-top: .75rem; }
  .new-trip-form.open { display: block; }
  
  .person-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 4px; }
  .person-input-wrap { position: relative; }
  .person-input-wrap .p-num { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 12px; color: #94a3b8; font-weight: 600; }
  .person-input-wrap input { padding-left: 28px; }
  
  label { font-size: 11px; font-weight: 700; letter-spacing: .05em; color: #475569; text-transform: uppercase; display: block; margin-bottom: 6px; }
  input[type=text], input[type=number], input[type=date], select { width: 100%; padding: .75rem .85rem; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 15px; font-family: 'DM Sans', sans-serif; color: #0f172a; background: #fff; outline: none; -webkit-appearance: none; }
  input:focus, select:focus { border-color: #0f172a; box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.06); }
  select { background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3E%3Cpath stroke='%2364748b' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3E%3C/svg%3E"); background-position: right 0.5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em; padding-right: 2.5rem; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .field { margin-bottom: 12px; }
  .amount-wrap { position: relative; }
  .amount-wrap select.cur-select { position: absolute; right: 0; top: 0; bottom: 0; width: 80px; border: none; border-left: 1.5px solid #e2e8f0; border-radius: 0 12px 12px 0; background: #f8fafc; font-size: 14px; font-weight: 600; padding: 0 .5rem; }
  .amount-wrap input { padding-right: 90px; }
  .btn-add { width: 100%; padding: .9rem; background: #0f172a; color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 6px; }
  .btn-add:disabled { opacity: .45; cursor: not-allowed; }
  .btn-report { width: 100%; padding: .75rem; background: #fff; color: #475569; border: 1.5px solid #e2e8f0; border-radius: 14px; font-size: 15px; font-weight: 600; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; }
  .btn-sm { font-size: 12px; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-weight: 600; border: none; }
  .btn-new { background: #e0f2fe; color: #0369a1; }
  .btn-trips { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
  .btn-save { background: #0f172a; color: #fff; }
  .btn-cancel { background: #f1f5f9; color: #64748b; }
  .entry { display: flex; align-items: center; padding: .85rem .25rem; border-bottom: 1px solid #f1f5f9; gap: 10px; }
  .entry-left { flex: 1; }
  .entry-left .desc { font-size: 15px; font-weight: 600; color: #0f172a; }
  .entry-left .meta { font-size: 12px; color: #64748b; margin-top: 3px; }
  .entry-right { text-align: right; margin-right: 4px; }
  .entry-right .price { font-size: 16px; font-weight: 700; color: #0f172a; }
  .entry-right .who { font-size: 12px; color: #64748b; margin-top: 1px; font-weight: 500; }
  .entry-actions { display: flex; gap: 6px; }
  .btn-icon { width: 34px; height: 34px; border-radius: 10px; border: 1px solid #e2e8f0; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); z-index: 100; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 20px; padding: 1.5rem; width: 100%; max-width: 460px; }
  .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 1.25rem; }
  .modal-actions { display: flex; gap: 10px; margin-top: 1rem; }
  .modal-actions button { flex: 1; padding: 0.75rem; }
  .empty { text-align: center; color: #94a3b8; font-size: 14px; padding: 2rem 0; }
  .msg { font-size: 14px; color: #059669; margin-top: 10px; text-align: center; min-height: 20px; font-weight: 600; }
  .err { color: #dc2626; }
  .hint { font-size: 12px; color: #64748b; margin-bottom: 8px; margin-top: -4px; }
  hr { border: none; border-top: 1px solid #e2e8f0; margin: 1.25rem 0; }
</style>
</head>
<body>

<div class="app-container">
  <h1>Family Expense Tracker</h1>
  <p class="subtitle">Shared real-time tracking</p>
  <div class="user-badge" id="userIdentityBadge" onclick="promptForIdentity(true)">Logging as: Guest</div>

  <div class="total-box">
    <div class="lbl">Total Spent</div>
    <div class="amt" id="total">$0.00</div>
    <div class="amt2" id="totalSecondary"></div>
  </div>

  <div class="sec">Current Trip</div>
  <div class="trip-panel">
    <div class="trip-active">
      <span id="tripActiveName">Loading trips...</span>
      <span class="cur-badge" id="tripCurBadge" style="display:none"></span>
    </div>
    
    <div class="people-badges" id="peopleBadges"></div>
    
    <div class="trip-actions-row">
      <button class="btn-sm btn-trips" onclick="toggleTripList()" id="switchBtn">Switch trip</button>
      <button class="btn-sm btn-new" onclick="toggleNewTripForm()">+ New trip</button>
    </div>

    <div class="trip-list" id="tripList"></div>

    <div class="new-trip-form" id="newTripForm">
      <hr/>
      <div class="field"><label>Trip name</label><input type="text" id="tripInput" placeholder="e.g., Tokyo Nov 2026" /></div>
      
      <div class="row2">
        <div class="field">
          <label>Local Currency</label>
          <select id="localCurrency">
            <option value="KHR" data-symbol="៛" data-rate="4100">KHR – Cambodian Riel</option>
            <option value="THB" data-symbol="฿" data-rate="33">THB – Thai Baht</option>
            <option value="VND" data-symbol="₫" data-rate="25000">VND – Vietnamese Dong</option>
            <option value="MYR" data-symbol="RM" data-rate="4.7">MYR – Malaysian Ringgit</option>
            <option value="SGD" data-symbol="S$" data-rate="1.35">SGD – Singapore Dollar</option>
            <option value="IDR" data-symbol="Rp" data-rate="16000">IDR – Indonesian Rupiah</option>
            <option value="PHP" data-symbol="₱" data-rate="58">PHP – Philippine Peso</option>
            <option value="LAK" data-symbol="₭" data-rate="21000">LAK – Lao Kip</option>
            <option value="JPY" data-symbol="¥" data-rate="155">JPY – Japanese Yen</option>
            <option value="KRW" data-symbol="₩" data-rate="1370">KRW – South Korean Won</option>
            <option value="CNY" data-symbol="¥" data-rate="7.2">CNY – Chinese Yuan</option>
            <option value="TWD" data-symbol="NT$" data-rate="32">TWD – New Taiwan Dollar</option>
            <option value="HKD" data-symbol="HK$" data-rate="7.8">HKD – Hong Kong Dollar</option>
            <option value="USD" data-symbol="$" data-rate="1">USD – US Dollar</option>
            <option value="EUR" data-symbol="€" data-rate="0.92">EUR – Euro</option>
            <option value="GBP" data-symbol="£" data-rate="0.78">GBP – British Pound</option>
            <option value="AUD" data-symbol="A$" data-rate="1.50">AUD – Australian Dollar</option>
            <option value="CAD" data-symbol="C$" data-rate="1.37">CAD – Canadian Dollar</option>
          </select>
        </div>

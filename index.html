<!DOCTYPE html>
<html lang="en">
<head>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Expense Tracker">
<meta name="mobile-web-app-capable" content="yes">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Family Expense Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: #f4f7fa; min-height: 100vh; color: #0f172a; display: flex; justify-content: center; }
  .app-container { width: 100%; max-width: 540px; background: #fff; min-height: 100vh; padding: 1.5rem 1.25rem; display: flex; flex-direction: column; }
  @media (min-width: 540px) { body { padding: 2rem 1rem; } .app-container { min-height: auto; border-radius: 24px; box-shadow: 0 10px 40px rgba(15, 23, 42, 0.06); padding: 2rem; } }
  h1 { font-size: 24px; font-weight: 700; text-align: center; color: #0f172a; letter-spacing: -0.02em; }
  .subtitle { font-size: 14px; color: #64748b; text-align: center; margin-top: 4px; font-weight: 500; }
  .user-badge { text-align: center; font-size: 12px; color: #0369a1; background: #e0f2fe; padding: 4px 12px; border-radius: 20px; width: fit-content; margin: 8px auto 0 auto; font-weight: 600; cursor: pointer; }
  .total-box { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); border-radius: 18px; padding: 1.5rem 1.25rem; text-align: center; margin: 1.5rem 0; box-shadow: 0 8px 20px rgba(15, 23, 42, 0.15); }
  .total-box .lbl { font-size: 11px; letter-spacing: .12em; color: #94a3b8; text-transform: uppercase; font-weight: 600; }
  .total-box .amt { font-size: 36px; font-weight: 700; color: #fff; margin-top: 4px; letter-spacing: -0.03em; }
  .total-box .amt2 { font-size: 15px; color: #cbd5e1; margin-top: 4px; font-weight: 500; }
  .sec { font-size: 11px; font-weight: 700; letter-spacing: .08em; color: #64748b; text-transform: uppercase; margin-bottom: 8px; margin-top: 1.25rem; display: flex; align-items: center; justify-content: space-between; }
  .trip-panel { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 1.1rem; margin-bottom: 1.25rem; }
  .trip-active { display: flex; align-items: center; gap: 8px; font-size: 15px; color: #0f172a; font-weight: 600; flex-wrap: wrap; }
  .cur-badge { font-size: 11px; background: #e0f2fe; color: #0369a1; border-radius: 8px; padding: 4px 8px; font-weight: 700; margin-left: auto; }
  .people-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #e2e8f0; }
  .person-pill { font-size: 12px; background: #fff; color: #475569; border-radius: 8px; padding: 4px 10px; font-weight: 500; border: 1px solid #e2e8f0; }
  .trip-actions-row { display: flex; gap: 8px; width: 100%; margin-top: 12px; }
  .trip-actions-row button { flex: 1; }
  .trip-list { margin-top: .75rem; display: none; }
  .trip-list.open { display: block; }
  .trip-item { display: flex; align-items: center; justify-content: space-between; padding: .75rem; border-radius: 10px; cursor: pointer; font-size: 14px; border: 1px solid #e2e8f0; margin-bottom: 6px; background: #fff; }
  .trip-item.active { border-color: #0f172a; background: #f8fafc; font-weight: 600; }
  .new-trip-form { display: none; margin-top: .75rem; }
  .new-trip-form.open { display: block; }
  
  .person-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 4px; }
  .person-input-wrap { position: relative; }
  .person-input-wrap .p-num { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 12px; color: #94a3b8; font-weight: 600; }
  .person-input-wrap input { padding-left: 28px; }
  
  label { font-size: 11px; font-weight: 700; letter-spacing: .05em; color: #475569; text-transform: uppercase; display: block; margin-bottom: 6px; }
  input[type=text], input[type=number], input[type=date], select { width: 100%; padding: .75rem .85rem; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 15px; font-family: 'DM Sans', sans-serif; color: #0f172a; background: #fff; outline: none; -webkit-appearance: none; }
  input:focus, select:focus { border-color: #0f172a; box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.06); }
  select { background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3E%3Cpath stroke='%2364748b' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3E%3C/svg%3E"); background-position: right 0.5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em; padding-right: 2.5rem; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .field { margin-bottom: 12px; }
  .amount-wrap { position: relative; }
  .amount-wrap select.cur-select { position: absolute; right: 0; top: 0; bottom: 0; width: 80px; border: none; border-left: 1.5px solid #e2e8f0; border-radius: 0 12px 12px 0; background: #f8fafc; font-size: 14px; font-weight: 600; padding: 0 .5rem; }
  .amount-wrap input { padding-right: 90px; }
  .btn-add { width: 100%; padding: .9rem; background: #0f172a; color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 6px; }
  .btn-add:disabled { opacity: .45; cursor: not-allowed; }
  .btn-report { width: 100%; padding: .75rem; background: #fff; color: #475569; border: 1.5px solid #e2e8f0; border-radius: 14px; font-size: 15px; font-weight: 600; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; }
  .btn-sm { font-size: 12px; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-weight: 600; border: none; }
  .btn-new { background: #e0f2fe; color: #0369a1; }
  .btn-trips { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
  .btn-save { background: #0f172a; color: #fff; }
  .btn-cancel { background: #f1f5f9; color: #64748b; }
  .entry { display: flex; align-items: center; padding: .85rem .25rem; border-bottom: 1px solid #f1f5f9; gap: 10px; }
  .entry-left { flex: 1; }
  .entry-left .desc { font-size: 15px; font-weight: 600; color: #0f172a; }
  .entry-left .meta { font-size: 12px; color: #64748b; margin-top: 3px; }
  .entry-right { text-align: right; margin-right: 4px; }
  .entry-right .price { font-size: 16px; font-weight: 700; color: #0f172a; }
  .entry-right .who { font-size: 12px; color: #64748b; margin-top: 1px; font-weight: 500; }
  .entry-actions { display: flex; gap: 6px; }
  .btn-icon { width: 34px; height: 34px; border-radius: 10px; border: 1px solid #e2e8f0; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); z-index: 100; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 20px; padding: 1.5rem; width: 100%; max-width: 460px; }
  .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 1.25rem; }
  .modal-actions { display: flex; gap: 10px; margin-top: 1rem; }
  .modal-actions button { flex: 1; padding: 0.75rem; }
  .empty { text-align: center; color: #94a3b8; font-size: 14px; padding: 2rem 0; }
  .msg { font-size: 14px; color: #059669; margin-top: 10px; text-align: center; min-height: 20px; font-weight: 600; }
  .err { color: #dc2626; }
  .hint { font-size: 12px; color: #64748b; margin-bottom: 8px; margin-top: -4px; }
  hr { border: none; border-top: 1px solid #e2e8f0; margin: 1.25rem 0; }
</style>
</head>
<body>

<div class="app-container">
  <h1>Family Expense Tracker</h1>
  <p class="subtitle">Shared real-time tracking</p>
  <div class="user-badge" id="userIdentityBadge" onclick="promptForIdentity(true)">Logging as: Guest</div>

  <div class="total-box">
    <div class="lbl">Total Spent</div>
    <div class="amt" id="total">$0.00</div>
    <div class="amt2" id="totalSecondary"></div>
  </div>

  <div class="sec">Current Trip</div>
  <div class="trip-panel">
    <div class="trip-active">
      <span id="tripActiveName">Loading trips...</span>
      <span class="cur-badge" id="tripCurBadge" style="display:none"></span>
    </div>
    
    <div class="people-badges" id="peopleBadges"></div>
    
    <div class="trip-actions-row">
      <button class="btn-sm btn-trips" onclick="toggleTripList()" id="switchBtn">Switch trip</button>
      <button class="btn-sm btn-new" onclick="toggleNewTripForm()">+ New trip</button>
    </div>

    <div class="trip-list" id="tripList"></div>

    <div class="new-trip-form" id="newTripForm">
      <hr/>
      <div class="field"><label>Trip name</label><input type="text" id="tripInput" placeholder="e.g., Tokyo Nov 2026" /></div>
      
      <div class="row2">
        <div class="field">
          <label>Local Currency</label>
          <select id="localCurrency">
            <option value="KHR" data-symbol="៛" data-rate="4100">KHR – Cambodian Riel</option>
            <option value="THB" data-symbol="฿" data-rate="33">THB – Thai Baht</option>
            <option value="VND" data-symbol="₫" data-rate="25000">VND – Vietnamese Dong</option>
            <option value="MYR" data-symbol="RM" data-rate="4.7">MYR – Malaysian Ringgit</option>
            <option value="SGD" data-symbol="S$" data-rate="1.35">SGD – Singapore Dollar</option>
            <option value="IDR" data-symbol="Rp" data-rate="16000">IDR – Indonesian Rupiah</option>
            <option value="PHP" data-symbol="₱" data-rate="58">PHP – Philippine Peso</option>
            <option value="LAK" data-symbol="₭" data-rate="21000">LAK – Lao Kip</option>
            <option value="JPY" data-symbol="¥" data-rate="155">JPY – Japanese Yen</option>
            <option value="KRW" data-symbol="₩" data-rate="1370">KRW – South Korean Won</option>
            <option value="CNY" data-symbol="¥" data-rate="7.2">CNY – Chinese Yuan</option>
            <option value="TWD" data-symbol="NT$" data-rate="32">TWD – New Taiwan Dollar</option>
            <option value="HKD" data-symbol="HK$" data-rate="7.8">HKD – Hong Kong Dollar</option>
            <option value="USD" data-symbol="$" data-rate="1">USD – US Dollar</option>
            <option value="EUR" data-symbol="€" data-rate="0.92">EUR – Euro</option>
            <option value="GBP" data-symbol="£" data-rate="0.78">GBP – British Pound</option>
            <option value="AUD" data-symbol="A$" data-rate="1.50">AUD – Australian Dollar</option>
            <option value="CAD" data-symbol="C$" data-rate="1.37">CAD – Canadian Dollar</option>
          </select>
        </div>
        <div class="field">
          <label>Number of People</label>
          <select id="memberCount" onchange="generatePeopleInputs()">
            <option value="1">1 Person</option>
            <option value="2">2 People</option>
            <option value="3">3 People</option>
            <option value="4" selected>4 People</option>
            <option value="5">5 People</option>
            <option value="6">6 People</option>
          </select>
        </div>
      </div>

      <div class="field"><label>Exchange rate (1 USD = ? local)</label><input type="number" id="exchangeRate" placeholder="e.g., 4100" step="any" /></div>
      
      <div class="field">
        <label>People's Names</label>
        <div class="person-grid" id="dynamicPeopleContainer"></div>
      </div>
      
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button class="btn-sm btn-save" style="flex:1;padding:.7rem;" id="startTripBtn" onclick="startNewTrip()">Start trip</button>
        <button class="btn-sm btn-cancel" style="flex:1;padding:.7rem;" onclick="toggleNewTripForm()">Cancel</button>
      </div>
    </div>
  </div>

  <div class="field"><label>Item description</label><input type="text" id="desc" placeholder="e.g., Coffee, Taxi" /></div>
  <div class="row2">
    <div class="field">
      <label>Amount</label>
      <div class="amount-wrap">
        <input type="number" id="amount" placeholder="0.00" min="0" step="0.01" inputmode="decimal" />
        <select class="cur-select" id="amountCurrency"><option value="USD">USD</option></select>
      </div>
    </div>
    <div class="field"><label>Date</label><input type="date" id="expDate" /></div>
  </div>
  <div class="row2">
    <div class="field">
      <label>Category</label>
      <select id="category">
        <option value="Food & Dining">🍽 Food & Dining</option>
        <option value="Transport">🚗 Transport</option>
        <option value="Accommodation">🏨 Accommodation</option>
        <option value="Shopping">🛍 Shopping</option>
        <option value="Other">🔧 Other</option>
      </select>
    </div>
    <div class="field"><label>Spent by</label><select id="spentBy"><option value="Shared">Shared</option></select></div>
  </div>

  <button class="btn-add" id="addBtn" onclick="addExpense()">Add Expense</button>
  <button class="btn-report" onclick="viewReport()">📊 View Detailed Report</button>
  <div class="msg" id="msg"></div>

  <div class="sec" style="margin-top:1.5rem;">Recent History</div>
  <div id="history"><div class="empty">Syncing data streams...</div></div>

  <div style="text-align: center; font-size: 11px; color: #94a3b8; margin-top: auto; padding-top: 2.5rem;">Made by Polin, with love.</div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2>✏️ Edit Expense</h2>
    <input type="hidden" id="editId" />
    <div class="field"><label>Description</label><input type="text" id="editDesc" /></div>
    <div class="row2">
      <div class="field"><label>Amount (USD)</label><input type="number" id="editAmount" step="0.01" inputmode="decimal" /></div>
      <div class="field"><label>Date</label><input type="date" id="editDate" /></div>
    </div>
    <div class="row2">
      <div class="field"><label>Category</label><select id="editCategory"><option value="Food & Dining">🍽 Food & Dining</option><option value="Transport">🚗 Transport</option><option value="Accommodation">🏨 Accommodation</option><option value="Shopping">🛍 Shopping</option><option value="Other">🔧 Other</option></select></div>
      <div class="field"><label>Spent by</label><select id="editSpentBy"></select></div>
    </div>
    <div class="modal-actions">
      <button class="btn-sm btn-save" onclick="saveEdit()">Save changes</button>
      <button class="btn-sm btn-cancel" onclick="closeEdit()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ─── INSERT YOUR GOOGLE SCRIPT DEPLOYMENT WEB APP URL HERE ───
const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw8Ufgf_CZohrIrEc_QLwCKYR65KTDlzfc2PgeT0qYiGJSmiuUP6apx21NLVPZ3jn49RQ/exec';

const SYMBOLS = { KHR:'៛', THB:'฿', VND:'₫', MYR:'RM', SGD:'S$', IDR:'Rp', PHP:'₱', LAK:'₭', JPY:'¥', KRW:'₩', CNY:'¥', TWD:'NT$', HKD:'HK$', USD:'$', EUR:'€', GBP:'£', AUD:'A$', CAD:'C$' };

let currentTrip    = localStorage.getItem('trip_name') || '';
let localCurCode   = localStorage.getItem('trip_localCur') || 'KHR';
let localCurSymbol = localStorage.getItem('trip_localSym') || '៛';
let exchangeRate   = parseFloat(localStorage.getItem('trip_rate')) || 4100;
let tripPeople     = JSON.parse(localStorage.getItem('trip_people') || '["Shared"]');
let currentUser    = localStorage.getItem('app_user_identity') || '';
let allTrips       = [];
let showTripList   = false;

document.getElementById('expDate').value = new Date().toISOString().split('T')[0];
document.getElementById('localCurrency').addEventListener('change', function() {
  document.getElementById('exchangeRate').value = this.options[this.selectedIndex].dataset.rate || '';
});

function promptForIdentity(forceChange = false) {
  if (!currentUser || forceChange) {
    let name = prompt("Who is using this app? Please enter your name:", currentUser);
    if (!name || name.trim() === "") {
      if (!currentUser) currentUser = "Guest";
    } else {
      currentUser = name.trim();
    }
    localStorage.setItem('app_user_identity', currentUser);
  }
  document.getElementById('userIdentityBadge').textContent = "Logging as: " + currentUser;
}

function generatePeopleInputs() {
  const count = parseInt(document.getElementById('memberCount').value);
  const container = document.getElementById('dynamicPeopleContainer');
  let html = '';
  const placeholders = ["Polin", "Ivy", "Kid 1", "Kid 2", "Guest 1", "Guest 2"];
  
  for(let i = 1; i <= count; i++) {
    const ph = placeholders[i-1] || `Person ${i}`;
    html += `
      <div class="person-input-wrap">
        <span class="p-num">${i}</span>
        <input type="text" class="person-name" placeholder="e.g. ${ph}" />
      </div>`;
  }
  container.innerHTML = html;
}

function buildSpentByDropdown(selectId) {
  const sel = document.getElementById(selectId);
  sel.innerHTML = tripPeople.map(p => `<option value="${p}">${p}</option>`).join('');
}

function updateTripUI() {
  if (!currentTrip) {
    document.getElementById('tripActiveName').textContent = "No active trip found.";
    document.getElementById('tripCurBadge').style.display = 'none';
    document.getElementById('history').innerHTML = '<div class="empty">Select or create a trip to see history</div>';
    return;
  }
  document.getElementById('tripActiveName').textContent = '✈️ ' + currentTrip;
  const badge = document.getElementById('tripCurBadge');
  badge.textContent = 'USD + ' + localCurCode;
  badge.style.display = 'inline';

  const pb = document.getElementById('peopleBadges');
  pb.innerHTML = tripPeople.map(p => `<span class="person-pill">${p}</span>`).join('');

  const sel = document.getElementById('amountCurrency');
  sel.innerHTML = `<option value="USD">USD</option><option value="${localCurCode}">${localCurCode}</option>`;

  buildSpentByDropdown('spentBy');
}

async function fetchTripsFromServer() {
  try {
    const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=get_trips`);
    allTrips = await res.json();
    
    if (allTrips.length > 0 && !currentTrip) {
      switchTripData(allTrips[allTrips.length - 1]);
    } else if (currentTrip) {
      const match = allTrips.find(t => t.name === currentTrip);
      if (match) switchTripData(match, false);
    }
    updateTripUI();
    loadHistory();
  } catch (err) {
    console.error("Error connecting with servers:", err);
    updateTripUI();
  }
}

function renderTripList() {
  const el = document.getElementById('tripList');
  el.innerHTML = allTrips.map(t => `
    <div class="trip-item ${t.name===currentTrip?'active':''}" onclick="switchTrip('${t.name.replace(/'/g,"\\'")}')">
      <div>
        <div style="font-weight: 600;">${t.name===currentTrip?'✈️ ':''}${t.name}</div>
        <div style="font-size:12px;color:#64748b;margin-top:2px;">USD + ${t.localCur} · ${(t.people||[]).filter(p=>p!=='Shared').join(', ')}</div>
      </div>
    </div>`).join('');
}

function toggleTripList() {
  showTripList = !showTripList;
  const el = document.getElementById('tripList');
  if (showTripList) { renderTripList(); el.classList.add('open'); }
  else el.classList.remove('open');
}

function toggleNewTripForm() {
  document.getElementById('newTripForm').classList.toggle('open');
  document.getElementById('tripList').classList.remove('open');
  showTripList = false;
  generatePeopleInputs();
}

function switchTrip(name) {
  const t = allTrips.find(x => x.name === name);
  if (!t) return;
  switchTripData(t);
  toggleTripList();
  updateTripUI();
  loadHistory();
}

function switchTripData(t, updateStorage = true) {
  currentTrip    = t.name;
  localCurCode   = t.localCur;
  localCurSymbol = SYMBOLS[t.localCur] || '$';
  exchangeRate   = t.rate || 4100;
  tripPeople     = t.people || ['Shared'];

  if (updateStorage) {
    localStorage.setItem('trip_name',     currentTrip);
    localStorage.setItem('trip_localCur', localCurCode);
    localStorage.setItem('trip_localSym', localCurSymbol);
    localStorage.setItem('trip_rate',     exchangeRate);
    localStorage.setItem('trip_people',   JSON.stringify(tripPeople));
  }
}

async function startNewTrip() {
  const name = document.getElementById('tripInput').value.trim();
  const rate  = parseFloat(document.getElementById('exchangeRate').value);
  const sel   = document.getElementById('localCurrency');

  if (!name) { alert('Please enter a trip name'); return; }
  if (!rate || rate<=0) { alert('Please enter an exchange rate'); return; }

  const people = ['Shared'];
  const inputs = document.querySelectorAll('.person-name');
  
  inputs.forEach(inp => { 
    const v = inp.value.trim(); 
    if (v && v !== 'Shared' && !people.includes(v)) { people.push(v); } 
  });

  const btn = document.getElementById('startTripBtn');
  btn.disabled = true; btn.textContent = 'Initializing...';

  try {
    const payload = {
      action: 'write',
      trip_name: name,
      description: 'Trip Initialization',
      all_people: people, // Pass complete collection down safely
      amount_usd: 0,
      amount_local: 0,
      currency: 'USD',
      local_currency: sel.value,
      category: 'Other',
      spent_by: people[1] || 'Shared', 
      added_by: currentUser
    };

    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    
    switchTripData({ name, localCur: sel.value, rate, people });
    document.getElementById('tripInput').value = '';
    toggleNewTripForm();
    await fetchTripsFromServer();
  } catch (err) {
    alert("Network communication exception.");
  } finally {
    btn.disabled = false; btn.textContent = 'Start trip';
  }
}

function toUSD(amount, currency) { return currency === 'USD' ? amount : amount / exchangeRate; }

async function loadHistory() {
  if (!currentTrip) return;
  try {
    const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=read&trip=${encodeURIComponent(currentTrip)}`);
    const data = await response.json();
    renderHistory(data);
  } catch(err) {
    document.getElementById('history').innerHTML = '<div class="empty err">Unable to read records from Google Sheet</div>';
  }
}

function renderHistory(rows) {
  const el = document.getElementById('history');
  if (!rows || rows.length === 0) {
    el.innerHTML = '<div class="empty">No expenses yet for this trip</div>';
    document.getElementById('total').textContent = '$0.00';
    document.getElementById('totalSecondary').textContent = '';
    return;
  }
  const totalUSD   = rows.reduce((s,r) => s + parseFloat(r.amount_usd||0), 0);
  const totalLocal = totalUSD * exchangeRate;
  document.getElementById('total').textContent = '$' + totalUSD.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
  
  if (localCurCode !== 'USD') {
    document.getElementById('totalSecondary').textContent = '≈ ' + localCurSymbol + totalLocal.toLocaleString('en',{maximumFractionDigits:0});
  } else {
    document.getElementById('totalSecondary').textContent = '';
  }

  el.innerHTML = rows.map(r => {
    const usd  = parseFloat(r.amount_usd||0);
    const disp = r.currency === localCurCode ? localCurSymbol + parseFloat(r.amount_local||0).toLocaleString('en',{maximumFractionDigits:2}) : '$' + usd.toFixed(2);
    const loggedByString = r.added_by ? ` (${r.added_by})` : '';

    return `
      <div class="entry">
        <div class="entry-left">
          <div class="desc">${r.description}</div>
          <div class="meta">${r.category} · ${r.expense_date}</div>
        </div>
        <div class="entry-right">
          <div class="price">${disp}</div>
          <div class="who">${r.spent_by || ''}${loggedByString}</div>
        </div>
        <div class="entry-actions">
          <button class="btn-icon" onclick='openEdit(${JSON.stringify(r)})'>✏️</button>
          <button class="btn-icon del" onclick="deleteEntry(${r.id})">🗑️</button>
        </div>
      </div>`;
  }).join('');
}

async function addExpense() {
  const desc     = document.getElementById('desc').value.trim();
  const amount   = parseFloat(document.getElementById('amount').value);
  const expDate  = document.getElementById('expDate').value;
  const category = document.getElementById('category').value;
  const spentBy  = document.getElementById('spentBy').value;
  const currency = document.getElementById('amountCurrency').value;

  if (!currentTrip) { alert('Please set a trip first'); return; }
  if (!desc) { alert('Please enter a description'); return; }
  if (!amount || amount<=0) { alert('Please enter a valid amount'); return; }

  const amountUSD   = toUSD(amount, currency);
  const amountLocal = currency === 'USD' ? amount * exchangeRate : amount;

  const btn = document.getElementById('addBtn');
  btn.disabled = true; btn.textContent = 'Saving...';

  try {
    const payload = {
      action: 'write', trip_name: currentTrip, description: desc,
      amount_usd: amountUSD, amount_local: amountLocal, currency, 
      local_currency: localCurCode, category, spent_by: spentBy, 
      expense_date: expDate, added_by: currentUser
    };

    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });

    document.getElementById('desc').value = '';
    document.getElementById('amount').value = '';
    document.getElementById('msg').textContent = '✓ Saved to Google Sheets!';
    setTimeout(() => document.getElementById('msg').textContent = '', 2500);
    setTimeout(() => loadHistory(), 600); 
  } catch (error) {
    document.getElementById('msg').innerHTML = '<span class="err">Submission exception.</span>';
  } finally {
    btn.disabled = false; btn.textContent = 'Add Expense';
  }
}

function openEdit(r) {
  document.getElementById('editId').value       = r.id;
  document.getElementById('editDesc').value     = r.description;
  document.getElementById('editAmount').value   = parseFloat(r.amount_usd||0).toFixed(2);
  document.getElementById('editDate').value     = r.expense_date;
  document.getElementById('editCategory').value = r.category;
  buildSpentByDropdown('editSpentBy');
  document.getElementById('editSpentBy').value  = r.spent_by||tripPeople[0];
  document.getElementById('editModal').classList.add('open');
}
function closeEdit() { document.getElementById('editModal').classList.remove('open'); }

async function saveEdit() {
  const id       = document.getElementById('editId').value;
  const desc     = document.getElementById('editDesc').value.trim();
  const amount   = parseFloat(document.getElementById('editAmount').value);
  const expDate  = document.getElementById('editDate').value;
  const category = document.getElementById('editCategory').value;
  const spentBy  = document.getElementById('editSpentBy').value;
  
  if (!desc || !amount || amount<=0) { alert('Please fill in all fields'); return; }
  
  try {
    const payload = { action: 'update', id, description: desc, amount_usd: amount, amount_local: amount * exchangeRate, expense_date: expDate, category, spent_by: spentBy };
    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    closeEdit(); setTimeout(() => loadHistory(), 500);
  } catch(e) { alert('Error updating.'); }
}

async function deleteEntry(id) {
  if (!confirm('Delete this expense?')) return;
  try {
    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete', id }) });
    setTimeout(() => loadHistory(), 500);
  } catch(e) { alert('Error dropping item.'); }
}

function viewReport() {
  if (!currentTrip) { alert('No trip selected'); return; }
  window.location.href = 'report.html?trip=' + encodeURIComponent(currentTrip);
}

// Runtime Execution Entry Point
promptForIdentity(false);
generatePeopleInputs();
fetchTripsFromServer();
</script>

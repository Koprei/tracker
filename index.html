<!DOCTYPE html>
<html lang="en">
<head>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Expense Tracker">
<meta name="mobile-web-app-capable" content="yes">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Family Expense Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: #f4f7fa; min-height: 100vh; color: #0f172a; display: flex; justify-content: center; }
  .app-container { width: 100%; max-width: 540px; background: #fff; min-height: 100vh; padding: 1.5rem 1.25rem; display: flex; flex-direction: column; }
  @media (min-width: 540px) { body { padding: 2rem 1rem; } .app-container { min-height: auto; border-radius: 24px; box-shadow: 0 10px 40px rgba(15, 23, 42, 0.06); padding: 2rem; } }
  h1 { font-size: 24px; font-weight: 700; text-align: center; color: #0f172a; letter-spacing: -0.02em; }
  .subtitle { font-size: 14px; color: #64748b; text-align: center; margin-top: 4px; font-weight: 500; }
  .user-badge { text-align: center; font-size: 12px; color: #0369a1; background: #e0f2fe; padding: 4px 12px; border-radius: 20px; width: fit-content; margin: 8px auto 0 auto; font-weight: 600; cursor: pointer; }
  .total-box { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); border-radius: 18px; padding: 1.5rem 1.25rem; text-align: center; margin: 1.5rem 0; box-shadow: 0 8px 20px rgba(15, 23, 42, 0.15); }
  .total-box .lbl { font-size: 11px; letter-spacing: .12em; color: #94a3b8; text-transform: uppercase; font-weight: 600; }
  .total-box .amt { font-size: 36px; font-weight: 700; color: #fff; margin-top: 4px; letter-spacing: -0.03em; }
  .total-box .amt2 { font-size: 15px; color: #cbd5e1; margin-top: 4px; font-weight: 500; }
  .sec { font-size: 11px; font-weight: 700; letter-spacing: .08em; color: #64748b; text-transform: uppercase; margin-bottom: 8px; margin-top: 1.25rem; display: flex; align-items: center; justify-content: space-between; }
  .trip-panel { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 1.1rem; margin-bottom: 1.25rem; }
  .trip-active { display: flex; align-items: center; gap: 8px; font-size: 15px; color: #0f172a; font-weight: 600; flex-wrap: wrap; }
  .cur-badge { font-size: 11px; background: #e0f2fe; color: #0369a1; border-radius: 8px; padding: 4px 8px; font-weight: 700; margin-left: auto; }
  .people-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #e2e8f0; }
  .person-pill { font-size: 12px; background: #fff; color: #475569; border-radius: 8px; padding: 4px 10px; font-weight: 500; border: 1px solid #e2e8f0; }
  .trip-actions-row { display: flex; gap: 8px; width: 100%; margin-top: 12px; }
  .trip-actions-row button { flex: 1; }
  .trip-list { margin-top: .75rem; display: none; }
  .trip-list.open { display: block; }
  .trip-item { display: flex; align-items: center; justify-content: space-between; padding: .75rem; border-radius: 10px; cursor: pointer; font-size: 14px; border: 1px solid #e2e8f0; margin-bottom: 6px; background: #fff; }
  .trip-item.active { border-color: #0f172a; background: #f8fafc; font-weight: 600; }
  .new-trip-form { display: none; margin-top: .75rem; }
  .new-trip-form.open { display: block; }
  .person-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 4px; }
  label { font-size: 11px; font-weight: 700; letter-spacing: .05em; color: #475569; text-transform: uppercase; display: block; margin-bottom: 6px; }
  input[type=text], input[type=number], input[type=date], select { width: 100%; padding: .75rem .85rem; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 15px; font-family: 'DM Sans', sans-serif; color: #0f172a; background: #fff; outline: none; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .field { margin-bottom: 12px; }
  .amount-wrap { position: relative; }
  .amount-wrap select.cur-select { position: absolute; right: 0; top: 0; bottom: 0; width: 80px; border: none; border-left: 1.5px solid #e2e8f0; border-radius: 0 12px 12px 0; background: #f8fafc; font-size: 14px; font-weight: 600; padding: 0 .5rem; }
  .amount-wrap input { padding-right: 90px; }
  .btn-add { width: 100%; padding: .9rem; background: #0f172a; color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 6px; }
  .btn-add:disabled { opacity: .45; cursor: not-allowed; }
  .btn-report { width: 100%; padding: .75rem; background: #fff; color: #475569; border: 1.5px solid #e2e8f0; border-radius: 14px; font-size: 15px; font-weight: 600; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 6px; text-decoration: none; }
  .btn-sm { font-size: 12px; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-weight: 600; border: none; }
  .btn-new { background: #e0f2fe; color: #0369a1; }
  .btn-trips { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
  .btn-save { background: #0f172a; color: #fff; padding: 8px; border-radius: 8px; cursor: pointer;}
  .entry { display: flex; align-items: center; padding: .85rem .25rem; border-bottom: 1px solid #f1f5f9; gap: 10px; }
  .entry-left { flex: 1; }
  .entry-left .desc { font-size: 15px; font-weight: 600; color: #0f172a; }
  .entry-left .meta { font-size: 12px; color: #64748b; margin-top: 3px; }
  .entry-right { text-align: right; margin-right: 4px; }
  .entry-right .price { font-size: 16px; font-weight: 700; color: #0f172a; }
  .entry-right .who { font-size: 12px; color: #64748b; margin-top: 1px; font-weight: 500; }
  .btn-icon { width: 34px; height: 34px; border-radius: 10px; border: 1px solid #e2e8f0; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .empty { text-align: center; color: #94a3b8; font-size: 14px; padding: 2rem 0; }
  .msg { font-size: 14px; color: #059669; margin-top: 10px; text-align: center; font-weight: 600; }
  .err { color: #dc2626; }
  hr { border: none; border-top: 1px solid #e2e8f0; margin: 1.25rem 0; }
</style>
</head>
<body>

<div class="app-container">
  <h1>Family Expense Tracker</h1>
  <p class="subtitle">Shared real-time tracking</p>
  <div class="user-badge" id="userIdentityBadge" onclick="promptForIdentity()">Logging as: Guest</div>

  <div class="total-box">
    <div class="lbl">Total Spent</div>
    <div class="amt" id="total">$0.00</div>
    <div class="amt2" id="totalSecondary"></div>
  </div>

  <div class="sec">Current Trip</div>
  <div class="trip-panel">
    <div class="trip-active">
      <span id="tripActiveName">Loading trips...</span>
      <span class="cur-badge" id="tripCurBadge" style="display:none"></span>
    </div>
    <div class="people-badges" id="peopleBadges"></div>
    <div class="trip-actions-row">
      <button class="btn-sm btn-trips" onclick="toggleTripList()" id="switchBtn">Switch trip</button>
      <button class="btn-sm btn-new" onclick="toggleNewTripForm()">+ New trip</button>
    </div>

    <div class="trip-list" id="tripList"></div>

    <div class="new-trip-form" id="newTripForm">
      <hr/>
      <div class="field"><label>Trip name</label><input type="text" id="tripInput" placeholder="e.g., Tokyo Nov 2026" /></div>
      <div class="row2">
        <div class="field">
          <label>Local Currency</label>
          <select id="localCurrency">
            <option value="KHR" data-symbol="៛" data-rate="4100">KHR – Cambodian Riel</option>
            <option value="THB" data-symbol="฿" data-rate="33">THB – Thai Baht</option>
            <option value="VND" data-symbol="₫" data-rate="25000">VND – Vietnamese Dong</option>
            <option value="MYR" data-symbol="RM" data-rate="4.7">MYR – Malaysian Ringgit</option>
            <option value="JPY" data-symbol="¥" data-rate="155">JPY – Japanese Yen</option>
            <option value="EUR" data-symbol="€" data-rate="0.92">EUR – Euro</option>
            <option value="GBP" data-symbol="£" data-rate="0.78">GBP – British Pound</option>
          </select>
        </div>
        <div class="field"><label>Exchange Rate (1 USD =)</label><input type="number" step="any" id="customRate" value="4100"/></div>
      </div>
      <div class="field">
        <label>Spenders / Participants</label>
        <div class="person-grid">
          <input type="text" class="p-name-input" placeholder="Person 1" value="Polin" />
          <input type="text" class="p-name-input" placeholder="Person 2" value="Ivy" />
          <input type="text" class="p-name-input" placeholder="Person 3" />
          <input type="text" class="p-name-input" placeholder="Person 4" />
        </div>
      </div>
      <button class="btn-save" onclick="createNewTrip()">Initialize Trip</button>
    </div>
  </div>

  <div id="mainFormBlock" style="display:none;">
    <div class="sec">Add New Expense</div>
    <div class="field"><label>Item Description</label><input type="text" id="description" placeholder="e.g., Grocery, Coffee, Taxi" /></div>
    
    <div class="row2">
      <div class="field">
        <label>Amount</label>
        <div class="amount-wrap">
          <input type="number" step="any" id="amount" placeholder="0.00" oninput="calculateExchange()"/>
          <select class="cur-select" id="inputCurrency" onchange="calculateExchange()">
            <option value="USD">USD ($)</option>
            <option value="LOCAL" id="localOptSlot">LOCAL</option>
          </select>
        </div>
      </div>
      <div class="field"><label>Date</label><input type="date" id="expenseDate" /></div>
    </div>

    <div class="row2">
      <div class="field"><label>Category</label>
        <select id="category">
          <option value="🍔 Food & Dining">🍔 Food & Dining</option>
          <option value="🚖 Transport">🚖 Transport</option>
          <option value="🏨 Hotel & Stay">🏨 Hotel & Stay</option>
          <option value="🎟️ Entertainment">🎟️ Entertainment</option>
          <option value="🛍️ Shopping">🛍️ Shopping</option>
          <option value="📦 Others">📦 Others</option>
        </select>
      </div>
      <div class="field"><label>Spent By</label><select id="spentBy"></select></div>
    </div>

    <button class="btn-add" id="submitBtn" onclick="addExpense()">Add Expense</button>
    <div id="feedback" class="msg"></div>
  </div>

  <div class="sec">History Log</div>
  <div id="historyContainer"><div class="empty">Connect your data engine above...</div></div>
  
  <a href="#" id="reportLink" class="btn-report">📊 View Detailed Report</a>
</div>

<script>
const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw8Ufgf_CZohrIrEc_QLwCKYR65KTDlzfc2PgeT0qYiGJSmiuUP6apx21NLVPZ3jn49RQ/exec';

let currentTrip = null;
let activeTripsList = [];
let activeLocalSymbol = "៛";
let activeExchangeRate = 4100;

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById('expenseDate').value = new Date().toISOString().substring(0,10);
  setupIdentity();
  fetchTripsData();
  
  document.getElementById('localCurrency').addEventListener('change', (e) => {
    const opt = e.target.options[e.target.selectedIndex];
    document.getElementById('customRate').value = opt.getAttribute('data-rate');
  });
});

function setupIdentity() {
  let user = localStorage.getItem('expense_username') || "Guest";
  document.getElementById('userIdentityBadge').textContent = "Logging as: " + user;
}

function promptForIdentity() {
  let name = prompt("Enter your name to sign your expenses:");
  if(name && name.trim() !== "") {
    localStorage.setItem('expense_username', name.trim());
    setupIdentity();
  }
}

async function fetchTripsData() {
  try {
    const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=get_trips`);
    activeTripsList = await res.json();
    
    if(activeTripsList.length === 0) {
      document.getElementById('tripActiveName').textContent = "No trips found. Create one!";
      return;
    }
    
    let saved = localStorage.getItem('selected_trip');
    let matched = activeTripsList.find(t => t.name === saved) || activeTripsList[0];
    activateTrip(matched);
    buildTripSelectionMenu();
  } catch(e) {
    document.getElementById('tripActiveName').className = "trip-active err";
    document.getElementById('tripActiveName').textContent = "Handshake Error.";
  }
}

function activateTrip(tripObj) {
  currentTrip = tripObj;
  localStorage.setItem('selected_trip', tripObj.name);
  
  document.getElementById('tripActiveName').textContent = "✈️ " + tripObj.name;
  document.getElementById('mainFormBlock').style.display = 'block';
  
  // Set up local currencies
  const selectNode = document.getElementById('localCurrency');
  let matchedOption = Array.from(selectNode.options).find(o => o.value === tripObj.localCur);
  activeLocalSymbol = matchedOption ? matchedOption.getAttribute('data-symbol') : "៛";
  activeExchangeRate = matchedOption ? parseFloat(matchedOption.getAttribute('data-rate')) : 4100;
  
  document.getElementById('tripCurBadge').style.display = 'inline-block';
  document.getElementById('tripCurBadge').textContent = `USD + ${tripObj.localCur}`;
  document.getElementById('localOptSlot').textContent = tripObj.localCur;
  document.getElementById('localOptSlot').value = tripObj.localCur;
  
  // Paint person badges
  const badgesBox = document.getElementById('peopleBadges');
  badgesBox.innerHTML = tripObj.people.map(p => `<span class="person-pill">${p}</span>`).join('');
  
  // Populate "Spent By" dropdown options selector layout
  const spentBySelect = document.getElementById('spentBy');
  spentBySelect.innerHTML = tripObj.people.map(p => `<option value="${p}">${p}</option>`).join('');
  
  document.getElementById('reportLink').href = `report.html?trip=${encodeURIComponent(tripObj.name)}`;
  
  fetchHistory();
}

function buildTripSelectionMenu() {
  const container = document.getElementById('tripList');
  container.innerHTML = activeTripsList.map(t => `
    <div class="trip-item ${currentTrip && currentTrip.name === t.name ? 'active' : ''}" onclick="selectTripItem('${t.name}')">
      <span>✈️ <strong>${t.name}</strong></span>
      <span style="font-size:12px;color:#64748b;">${t.localCur}</span>
    </div>
  `).join('');
}

function selectTripItem(name) {
  let matched = activeTripsList.find(t => t.name === name);
  if(matched) {
    activateTrip(matched);
    toggleTripList();
  }
}

function toggleTripList() {
  document.getElementById('tripList').classList.toggle('open');
}
function toggleNewTripForm() {
  document.getElementById('newTripForm').classList.toggle('open');
}

async function createNewTrip() {
  const nameInput = document.getElementById('tripInput').value.trim();
  const curValue = document.getElementById('localCurrency').value;
  const rateValue = parseFloat(document.getElementById('customRate').value) || 4100;
  
  if(!nameInput) return alert("Please supply a trip title.");
  
  let pNames = ["Shared"];
  document.querySelectorAll('.p-name-input').forEach(el => {
    if(el.value.trim()) pNames.push(el.value.trim());
  });

  const payload = {
    action: "write",
    trip_name: nameInput,
    description: "Trip Initialization",
    amount_usd: 0,
    amount_local: 0,
    currency: "USD",
    local_currency: curValue,
    category: "System",
    spent_by: "Shared",
    all_people: pNames,
    added_by: localStorage.getItem('expense_username') || "Guest"
  };

  try {
    let res = await fetch(GOOGLE_SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
    let data = await res.json();
    if(data.status === "success") {
      document.getElementById('tripInput').value = "";
      toggleNewTripForm();
      fetchTripsData();
    }
  } catch(e) { alert("Initialization failed."); }
}

async function fetchHistory() {
  if(!currentTrip) return;
  const container = document.getElementById('historyContainer');
  container.innerHTML = '<div class="empty">Syncing records table...</div>';
  
  try {
    let res = await fetch(`${GOOGLE_SCRIPT_URL}?action=read&trip=${encodeURIComponent(currentTrip.name)}`);
    let entries = await res.json();
    
    let validRows = entries.filter(e => parseFloat(e.amount_usd || 0) > 0);
    let totalSumUSD = validRows.reduce((sum, item) => sum + parseFloat(item.amount_usd || 0), 0);
    
    document.getElementById('total').textContent = `$${totalSumUSD.toFixed(2)}`;
    document.getElementById('totalSecondary').textContent = `≈ ${(totalSumUSD * activeExchangeRate).toLocaleString(undefined, {maximumFractionDigits:0})} ${currentTrip.localCur}`;
    
    if(validRows.length === 0) {
      container.innerHTML = '<div class="empty">No expenses registered under this trip yet.</div>';
      return;
    }
    
    container.innerHTML = validRows.map(item => {
      let isLocal = item.currency !== "USD";
      let displayPrice = isLocal ? 
        `${activeLocalSymbol}${parseFloat(item.amount_local).toLocaleString(undefined, {maximumFractionDigits:2})}` : 
        `$${parseFloat(item.amount_usd).toFixed(2)}`;
        
      return `
        <div class="entry">
          <div class="entry-left">
            <div class="desc">${item.description}</div>
            <div class="meta">${item.expense_date} • ${item.category}</div>
          </div>
          <div class="entry-right">
            <div class="price">${displayPrice}</div>
            <div class="who">${item.spent_by}</div>
          </div>
          <button class="btn-icon" onclick="deleteItem('${item.id}')">🗑️</button>
        </div>`;
    }).join('');
    
  } catch(e) { container.innerHTML = '<div class="empty err">Failed syncing log.</div>'; }
}

async function addExpense() {
  const desc = document.getElementById('description').value.trim();
  const amt = parseFloat(document.getElementById('amount').value) || 0;
  const cur = document.getElementById('inputCurrency').value;
  
  if(!desc || amt <= 0) return alert("Verify fields are filled out.");
  
  let usd = cur === "USD" ? amt : amt / activeExchangeRate;
  let loc = cur === "USD" ? amt * activeExchangeRate : amt;
  
  const payload = {
    action: "write",
    trip_name: currentTrip.name,
    description: desc,
    amount_usd: usd,
    amount_local: loc,
    currency: cur === "USD" ? "USD" : currentTrip.localCur,
    local_currency: currentTrip.localCur,
    category: document.getElementById('category').value,
    spent_by: document.getElementById('spentBy').value,
    expense_date: document.getElementById('expenseDate').value,
    added_by: localStorage.getItem('expense_username') || "Guest"
  };

  document.getElementById('submitBtn').disabled = true;
  try {
    let res = await fetch(GOOGLE_SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
    let data = await res.json();
    if(data.status === "success") {
      document.getElementById('description').value = "";
      document.getElementById('amount').value = "";
      fetchHistory();
    }
  } catch(e) { alert("Failed storing record."); }
  document.getElementById('submitBtn').disabled = false;
}

async function deleteItem(id) {
  if(!confirm("Delete this entry row?")) return;
  try {
    let res = await fetch(GOOGLE_SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "delete", id: id }) });
    let data = await res.json();
    if(data.status === "success") fetchHistory();
  } catch(e) { alert("Delete failed."); }
}

function calculateExchange() {}
</script>
</body>
</html>

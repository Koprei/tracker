<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Let's go - តោះដើរលេង | Settlement Report</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #f4f7fa; color: #0f172a; padding: 1.5rem 1rem; display: flex; justify-content: center; }
  .report-container { width: 100%; max-width: 600px; background: #fff; border-radius: 24px; box-shadow: 0 10px 40px rgba(15, 23, 42, 0.06); padding: 2rem; }
  h1 { font-size: 24px; font-weight: 700; text-align: center; color: #0f172a; letter-spacing: -0.02em; }
  .subtitle { font-size: 14px; color: #64748b; text-align: center; margin-top: 4px; font-weight: 500; margin-bottom: 1.5rem; }
  .trip-title { font-size: 18px; font-weight: 700; color: #0369a1; background: #e0f2fe; padding: 8px 16px; border-radius: 12px; text-align: center; margin-bottom: 1.5rem; }
  .section-title { font-size: 12px; font-weight: 700; letter-spacing: .08em; color: #64748b; text-transform: uppercase; margin-bottom: 10px; margin-top: 1.5rem; }
  .card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; }
  .flex-row { display: flex; justify-content: space-between; align-items: center; padding: .6rem 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
  .flex-row:last-child { border-bottom: none; }
  .name { font-weight: 600; color: #334155; }
  .amount { font-weight: 700; color: #0f172a; }
  .debt-row { display: flex; align-items: center; justify-content: space-between; padding: .75rem 0; border-bottom: 1px dashed #e2e8f0; font-size: 14px; }
  .debt-row:last-child { border-bottom: none; }
  .giver { font-weight: 600; color: #dc2626; }
  .receiver { font-weight: 600; color: #16a34a; }
  .arrow { color: #64748b; font-size: 12px; margin: 0 6px; }
  .btn-back { display: block; text-align: center; width: 100%; padding: .9rem; background: #0f172a; color: #fff; border: none; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; margin-top: 2rem; }
  .empty { text-align: center; color: #94a3b8; font-size: 14px; padding: 1.5rem 0; }
  .loading { text-align: center; color: #64748b; font-size: 15px; padding: 3rem 0; }
</style>
</head>
<body>

<div class="report-container">
  <h1>Let's go - តោះដើរលេង</h1>
  <p class="subtitle">Settlement & Balance Sheet</p>
  
  <div class="trip-title" id="tripNameDisplay">Checking parameters...</div>
  
  <div id="loadingState" class="loading">Calculating balances & debts matrix...</div>
  
  <div id="reportContent" style="display:none;">
    <div class="section-title">Total Breakdown</div>
    <div class="card" id="totalsCard"></div>
    
    <div class="section-title">Individual Balances (Paid vs Share)</div>
    <div class="card" id="balancesCard"></div>
    
    <div class="section-title">Suggested Reimbursements</div>
    <div class="card" id="debtsCard"></div>
  </div>
  
  <a href="index.html" class="btn-back">← Back to Expense Log</a>
</div>

<script>
const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw8Ufgf_CZohrIrEc_QLwCKYR65KTDlzfc2PgeT0qYiGJSmiuUP6apx21NLVPZ3jn49RQ/exec';

document.addEventListener("DOMContentLoaded", () => {
  const urlParams = new URLSearchParams(window.location.search);
  const tripName = urlParams.get('trip');
  
  if(!tripName) {
    document.getElementById('tripNameDisplay').textContent = "No Trip Selected";
    document.getElementById('loadingState').textContent = "Please go back and select a valid trip tracker.";
    return;
  }
  
  document.getElementById('tripNameDisplay').textContent = "✈️ " + tripName;
  generateReport(tripName);
});

async function generateReport(tripName) {
  try {
    let res = await fetch(`${GOOGLE_SCRIPT_URL}?action=read&trip=${encodeURIComponent(tripName)}`);
    let entries = await res.json();
    
    // Process and isolate metadata row vs expense records
    let systemRow = entries.find(e => e.category === "System");
    let validExpenses = entries.filter(e => parseFloat(e.amount_usd || 0) > 0);
    
    if(!systemRow && validExpenses.length === 0) {
      showEmptyState();
      return;
    }
    
    // Build list of valid participants
    let people = [];
    if(systemRow && systemRow.all_people) {
      people = systemRow.all_people;
    } else {
      // Fallback unique values extractor if initialization row is corrupted
      let uniquePeople = new Set();
      validExpenses.forEach(e => uniquePeople.add(e.spent_by));
      people = Array.from(uniquePeople);
    }
    
    // 1. Calculate General Totals
    let totalUSD = validExpenses.reduce((sum, item) => sum + parseFloat(item.amount_usd || 0), 0);
    let localCurSymbol = systemRow ? systemRow.local_currency : "KHR";
    
    let totalsHtml = `
      <div class="flex-row"><span>Total Spent (USD)</span><span class="amount">$${totalUSD.toFixed(2)}</span></div>
      <div class="flex-row"><span>Total Participants</span><span class="amount">${people.length} members</span></div>
      <div class="flex-row"><span>Per Person Cost Share</span><span class="amount">$${(people.length ? (totalUSD / people.length) : 0).toFixed(2)}</span></div>
    `;
    document.getElementById('totalsCard').innerHTML = totalsHtml;
    
    // 2. Calculate Paid Amts vs Balances per individual
    let costPerPerson = people.length ? (totalUSD / people.length) : 0;
    let paidMap = {};
    people.forEach(p => paidMap[p] = 0);
    
    validExpenses.forEach(e => {
      if(paidMap[e.spent_by] !== undefined) {
        paidMap[e.spent_by] += parseFloat(e.amount_usd || 0);
      } else {
        // Edge fallback case for out-of-bounds spender profiles
        paidMap[e.spent_by] = parseFloat(e.amount_usd || 0);
      }
    });
    
    let balancesHtml = '';
    let netBalances = []; // Track actual balances for debt calculation matrix
    
    Object.keys(paidMap).forEach(person => {
      let paid = paidMap[person];
      let net = paid - costPerPerson;
      netBalances.push({ person: person, net: net });
      
      let netDisplay = net >= 0 ? `+$${net.toFixed(2)}` : `-$${Math.abs(net).toFixed(2)}`;
      let netStyle = net >= 0 ? 'color:#16a34a;font-weight:700;' : 'color:#dc2626;font-weight:700;';
      
      balancesHtml += `
        <div class="flex-row">
          <div>
            <span class="name">${person}</span>
            <div style="font-size:11px;color:#64748b;margin-top:2px;">Paid: $${paid.toFixed(2)}</div>
          </div>
          <span style="${netStyle}">${netDisplay}</span>
        </div>`;
    });
    document.getElementById('balancesCard').innerHTML = balancesHtml;
    
    // 3. Compute Debt Settlement Log Matrix (Greedy Simplification Loop Engine)
    let debtors = netBalances.filter(x => x.net < 0).sort((a,b) => a.net - b.net); // Owes money
    let creditors = netBalances.filter(x => x.net > 0).sort((a,b) => b.net - a.net); // Owed money
    
    let debtsHtml = '';
    let debtorIdx = 0;
    let creditorIdx = 0;
    
    while(debtorIdx < debtors.length && creditorIdx < creditors.length) {
      let d = debtors[debtorIdx];
      let c = creditors[creditorIdx];
      
      let amountOwed = Math.abs(d.net);
      let amountCredited = c.net;
      
      let transfer = Math.min(amountOwed, amountCredited);
      
      debtsHtml += `
        <div class="debt-row">
          <span><span class="giver">${d.person}</span><span class="arrow">owes</span><span class="receiver">${c.person}</span></span>
          <span class="amount" style="color:#0f172a;">$${transfer.toFixed(2)}</span>
        </div>`;
        
      d.net += transfer;
      c.net -= transfer;
      
      if(Math.abs(d.net) < 0.01) debtorIdx++;
      if(Math.abs(c.net) < 0.01) creditorIdx++;
    }
    
    document.getElementById('debtsCard').innerHTML = debtsHtml || '<div class="empty">All accounts completely balanced! No transactions needed.</div>';
    
    // Toggle Layout Engine Visibility Views
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('reportContent').style.display = 'block';
    
  } catch(e) {
    document.getElementById('loadingState').className = "loading err";
    document.getElementById('loadingState').textContent = "Failed connecting to database calculation module.";
  }
}

function showEmptyState() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('reportContent').style.display = 'block';
  document.getElementById('totalsCard').innerHTML = '<div class="empty">No parameters detected.</div>';
  document.getElementById('balancesCard').innerHTML = '<div class="empty">No calculation records found.</div>';
  document.getElementById('debtsCard').innerHTML = '<div class="empty">No transfers needed.</div>';
}
</script>
</body>
</html>

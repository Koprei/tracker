<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Trip Financial Summary Report</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #f4f7fa; color: #0f172a; padding: 1rem .5rem; display: flex; justify-content: center; }
  .report-container { width: 100%; max-width: 600px; background: #fff; min-height: 100vh; padding: 1.5rem 1.25rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04); display: flex; flex-direction: column; }
  @media(min-width: 540px) { body { padding: 2rem 1rem; } .report-container { min-height: auto; padding: 2.2rem; } }
  
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .btn-back { background: #f1f5f9; border: 1px solid #e2e8f0; color: #475569; padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; }
  h1 { font-size: 22px; font-weight: 700; color: #0f172a; letter-spacing: -0.02em; }
  .trip-title { font-size: 16px; color: #0369a1; background: #e0f2fe; padding: 6px 14px; border-radius: 12px; width: fit-content; font-weight: 700; margin-top: 4px; }
  
  .stat-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-radius: 16px; padding: 1.25rem; color: #fff; box-shadow: 0 8px 20px rgba(15, 23, 42, 0.1); margin-bottom: 1.5rem; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .stat-item { border-left: 2px solid #38bdf8; padding-left: 10px; }
  .stat-lbl { font-size: 11px; text-transform: uppercase; color: #94a3b8; letter-spacing: .05em; font-weight: 600; }
  .stat-val { font-size: 20px; font-weight: 700; margin-top: 2px; }
  .stat-val.sub { font-size: 13px; color: #cbd5e1; font-weight: 500; }

  .sec-title { font-size: 12px; font-weight: 700; letter-spacing: .08em; color: #64748b; text-transform: uppercase; margin-bottom: 10px; margin-top: 1.5rem; border-bottom: 1px solid #f1f5f9; padding-bottom: 6px; }
  
  .bar-row { margin-bottom: 12px; }
  .bar-meta { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 4px; font-weight: 500; }
  .bar-track { background: #e2e8f0; height: 8px; border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; background: #0f172a; border-radius: 4px; width: 0; transition: width 0.4s ease; }

  .matrix-item { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .matrix-name { font-weight: 600; font-size: 15px; }
  .matrix-calc { text-align: right; }
  .text-green { color: #16a34a; font-weight: 700; }
  .text-red { color: #dc2626; font-weight: 700; }
  
  .settle-card { background: #f0fdf4; border: 1px dashed #bbf7d0; border-radius: 12px; padding: 12px; margin-bottom: 8px; font-size: 14px; color: #166534; font-weight: 500; display: flex; align-items: center; gap: 8px; }

  .table-row { display: flex; justify-content: space-between; padding: 10px 4px; border-bottom: 1px solid #f8fafc; font-size: 14px; }
  .table-row:last-child { border-bottom: none; }
  .tbl-desc { font-weight: 600; color: #0f172a; }
  .tbl-meta { font-size: 12px; color: #64748b; margin-top: 2px; }
  .tbl-amt { font-weight: 700; text-align: right; }
  
  .loading-state { text-align: center; color: #64748b; font-size: 15px; padding: 3rem 0; font-weight: 500; }
  .empty { text-align: center; color: #94a3b8; font-size: 14px; padding: 1.5rem 0; }
</style>
</head>
<body>

<div class="report-container">
  <div class="header">
    <div>
      <h1>Trip Analytics</h1>
      <div class="trip-title" id="tripHeaderName">Connecting...</div>
    </div>
    <a href="index.html" class="btn-back">← Back</a>
  </div>

  <div id="loadingBlock" class="loading-state">Compiling spreadsheet accounts...</div>

  <div id="reportContent" style="display: none;">
    <div class="stat-card">
      <div class="stat-grid">
        <div class="stat-item">
          <div class="stat-lbl">Total Trip Volume</div>
          <div class="stat-val" id="topTotalUSD">$0.00</div>
          <div class="stat-val sub" id="topTotalLocal"></div>
        </div>
        <div class="stat-item" style="border-color: #a855f7;">
          <div class="stat-lbl">Per Person Cost</div>
          <div class="stat-val" id="topPerPerson">$0.00</div>
          <div class="stat-val sub" id="topActiveCount">Shared Split</div>
        </div>
      </div>
    </div>

    <div class="sec-title">Balancing Matrix (Who owes What)</div>
    <div id="settlementPlan"></div>
    <div id="memberMatrix"></div>

    <div class="sec-title">Category Breakdown</div>
    <div id="categoryChart"></div>

    <div class="sec-title">Itemized History</div>
    <div id="historyLedger"></div>
  </div>
</div>

<script>
const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw8Ufgf_CZohrIrEc_QLwCKYR65KTDlzfc2PgeT0qYiGJSmiuUP6apx21NLVPZ3jn49RQ/exec';

const SYMBOLS = { KHR:'៛', THB:'฿', VND:'₫', MYR:'RM', SGD:'S$', IDR:'Rp', PHP:'₱', LAK:'₭', JPY:'¥', KRW:'₩', CNY:'¥', TWD:'NT$', HKD:'HK$', USD:'$', EUR:'€', GBP:'£', AUD:'A$', CAD:'C$' };

// Pull core identifiers out from query params or localStorage
const urlParams = new URLSearchParams(window.location.search);
const targetTripName = urlParams.get('trip') || localStorage.getItem('trip_name');

let localCurCode   = 'KHR';
let localCurSymbol = '៛';
let exchangeRate   = 4100;
let rosterNames    = ['Shared']; 

async function executeReportPipeline() {
  if (!targetTripName) {
    document.getElementById('loadingBlock').innerHTML = '⚠️ Error: No trip selected context found.';
    return;
  }
  document.getElementById('tripHeaderName').textContent = '✈️ ' + targetTripName;

  try {
    // 1. Sync data arrays from the dynamic endpoints
    const tripRes = await fetch(`${GOOGLE_SCRIPT_URL}?action=get_trips`);
    const trips   = await tripRes.json();
    const match   = trips.find(t => t.name === targetTripName);

    if (match) {
      localCurCode   = match.localCur || 'KHR';
      localCurSymbol = SYMBOLS[localCurCode] || '$';
      exchangeRate   = match.rate || 4100;
      rosterNames    = match.people || ['Shared'];
    }

    const dataRes = await fetch(`${GOOGLE_SCRIPT_URL}?action=read&trip=${encodeURIComponent(targetTripName)}`);
    const transactions = await dataRes.json();

    // 2. Clear out view constraints 
    document.getElementById('loadingBlock').style.display = 'none';
    document.getElementById('reportContent').style.display = 'block';

    generateMetrics(transactions);

  } catch (err) {
    console.error(err);
    document.getElementById('loadingBlock').innerHTML = '⚠️ Broken response from Google Sheets structure.';
  }
}

function generateMetrics(rows) {
  // Filter out any leftover trip config rows safely
  const expenses = rows.filter(r => r.description !== "Trip Initialization");

  const totalUSD = expenses.reduce((s, r) => s + parseFloat(r.amount_usd || 0), 0);
  const totalLocal = totalUSD * exchangeRate;

  // Render Headline Widgets
  document.getElementById('topTotalUSD').textContent = '$' + totalUSD.toLocaleString('en', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  if (localCurCode !== 'USD') {
    document.getElementById('topTotalLocal').textContent = '≈ ' + localCurSymbol + totalLocal.toLocaleString('en', {maximumFractionDigits: 0});
  }

  // Filter roster names to actual family members (exclude "Shared")
  const activeMembers = rosterNames.filter(name => name !== "Shared");
  const memberCount = activeMembers.length || 1;
  const perPersonCost = totalUSD / memberCount;

  document.getElementById('topPerPerson').textContent = '$' + perPersonCost.toLocaleString('en', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  document.getElementById('topActiveCount').textContent = `Split across ${memberCount} members`;

  // --- COMPUTE BALANCES ---
  // Initialize balances object
  let spentMap = {};
  let oweMap = {};
  activeMembers.forEach(m => { spentMap[m] = 0; oweMap[m] = 0; });

  expenses.forEach(r => {
    const amt = parseFloat(r.amount_usd || 0);
    const payer = r.spent_by;

    if (payer === "Shared") {
      // Split evenly among everyone
      activeMembers.forEach(m => { oweMap[m] += amt / memberCount; });
    } else {
      // Payer spent money for themselves
      if (spentMap[payer] !== undefined) {
        spentMap[payer] += amt;
        oweMap[payer] += amt;
      }
    }
  });

  // Render Individual Matrix
  const matrixContainer = document.getElementById('memberMatrix');
  let matrixHtml = '';

  activeMembers.forEach(m => {
    const net = spentMap[m] - oweMap[m];
    let statusText = '';
    if (net > 0) {
      statusText = `<span class="text-green">Gets back $${net.toFixed(2)}</span>`;
    } else if (net < 0) {
      statusText = `<span class="text-red">Owes $${Math.abs(net).toFixed(2)}</span>`;
    } else {
      statusText = `<span style="color:#64748b;font-weight:600;">Settled</span>`;
    }

    matrixHtml += `
      <div class="matrix-item">
        <div class="matrix-name">${m}</div>
        <div class="matrix-calc">
          <div style="font-size:12px;color:#64748b;">Paid: $${spentMap[m].toFixed(2)} | Owes: $${oweMap[m].toFixed(2)}</div>
          <div style="margin-top:2px;">${statusText}</div>
        </div>
      </div>`;
  });
  matrixContainer.innerHTML = matrixHtml || '<div class="empty">No roster metrics found.</div>';

  // --- DEBT CLEARING ALGORITHM ---
  let debtList = [];
  activeMembers.forEach(m => {
    debtList.push({ name: m, balance: spentMap[m] - oweMap[m] });
  });

  const settlementContainer = document.getElementById('settlementPlan');
  let settlementHtml = '';

  // Safe iteration parameters to clear up cross-debts
  let loops = 0;
  while (loops < 50) {
    debtList.sort((a, b) => a.balance - b.balance);
    let debtor = debtList[0];
    let creditor = debtList[debtList.length - 1];

    if (!debtor || !creditor || Math.abs(debtor.balance) < 0.01 || Math.abs(creditor.balance) < 0.01) break;

    let amountToS
